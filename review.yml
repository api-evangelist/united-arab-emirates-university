  - date: '2026-06-03'
    rating: 2
    summary: >-
      UAEU has a modest but real public, machine-readable footprint rather than a
      formal developer program. The Scholarworks@UAEU OAI-PMH 2.0 endpoint was
      verified live, returning valid OAI-PMH XML (repositoryName
      "Scholarworks@UAEU", Digital Commons / bepress platform). UAEU also publishes
      open datasets as an organization on the UAE national open data portal (FCSC),
      a CKAN platform with an Action API, though scripted API calls are blocked by
      Cloudflare bot mitigation (403). The UAEU Division of IT GitHub org (uitsws)
      exists but has zero public repositories. No self-service developer portal,
      documented SIS/catalog/timetable API, or public mobile-app backend was found.
      All endpoints below were probed directly; no endpoints were fabricated.
    endpoints:
