aid: united-arab-emirates-university
name: United Arab Emirates University
description: >-
  United Arab Emirates University (UAEU) is a public research university in Al Ain,
  United Arab Emirates, ranked #262 in the QS World University Rankings 2025. Its
  public, machine-readable developer footprint is limited and oriented toward
  research and open data rather than a formal developer program: the UAEU Library
  operates Scholarworks@UAEU, a bepress Digital Commons institutional repository
  that exposes a standards-based OAI-PMH 2.0 metadata harvesting endpoint, and UAEU
  publishes open datasets through the UAE national open data portal (FCSC), which is
  built on CKAN and offers a CKAN Action API. UAEU's Division of Information
  Technology maintains a GitHub organization (uitsws / UAEU-DOIT), but it currently
  has no public repositories. No general-purpose, self-service public developer
  portal or documented student-information / catalog API was found.
