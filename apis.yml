  - aid: united-arab-emirates-university:fcsc-open-data
    name: UAEU Open Data on UAE National Portal (CKAN)
    description: >-
      UAEU publishes open datasets (e.g. UAEU granted patents and digital
      transaction reports) as an organization on the UAE national open data
